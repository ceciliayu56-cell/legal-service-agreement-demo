<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合规事后抽查</title>
    <style>
      :root { --bg:#f5f7fb; --panel:#fff; --text:#172033; --muted:#667085; --line:#e5eaf0; --primary:#1f6feb; --red:#d92d20; --green:#079455; --amber:#b54708; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--text); font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif; }
      header { height:72px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; background:#fff; border-bottom:1px solid var(--line); }
      main { max-width:1240px; margin:26px auto; padding:0 24px; display:grid; gap:18px; }
      h1,h2,p { margin:0; }
      h1 { font-size:22px; }
      .muted { color:var(--muted); margin-top:6px; }
      .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 24px rgba(16,24,40,.06); padding:20px; }
      .denied { min-height:300px; display:grid; place-items:center; font-size:22px; font-weight:700; color:var(--muted); }
      .stats { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; }
      .stat { border:1px solid var(--line); border-radius:8px; background:#fff; padding:16px; }
      .stat span { color:var(--muted); font-size:14px; }
      .stat strong { display:block; margin-top:8px; font-size:28px; }
      .filters { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:13px; }
      select,input { height:36px; border:1px solid #cfd8e3; border-radius:7px; padding:0 10px; font:inherit; background:#fff; color:var(--text); }
      table { width:100%; border-collapse:collapse; }
      th,td { padding:12px 10px; border-bottom:1px solid var(--line); text-align:left; font-size:13px; vertical-align:top; }
      th { color:var(--muted); background:#fbfcfe; font-weight:650; }
      tr.high-risk { background:#fff8f8; }
      tr.high-risk td { border-bottom-color:#fee4e2; }
      .risk-number { font-weight:800; color:var(--red); }
      .tag { display:inline-flex; border-radius:999px; padding:4px 9px; font-size:12px; font-weight:700; background:#eef4ff; color:#175cd3; }
      .tag.red { background:#fff1f3; color:var(--red); }
      .tag.green { background:#ecfdf3; color:var(--green); }
      .tag.amber { background:#fffaeb; color:var(--amber); }
      .tag.gray { background:#f2f4f7; color:#475467; }
      a,button { color:var(--primary); font-weight:650; text-decoration:none; }
      button { min-height:32px; border:1px solid #b9cff8; border-radius:7px; padding:0 12px; background:#fff; cursor:pointer; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>合规事后抽查</h1>
        <p class="muted">查看已上传双章归档版的法律服务协议，集中抽查底线突破申请、风险识别、版本差异和归档情况。</p>
      </div>
      <a id="homeLink" href="./index.html">法律服务协议管理</a>
    </header>

    <main id="app"></main>

    <script>
      const roleParam = new URLSearchParams(location.search).get("role");
      const canReview = roleParam !== "secretary" && roleParam !== "lawyer" && roleParam !== "partner";
      document.getElementById("homeLink").href = "./index.html";

      const reviews = [
        { id:"LSA-20260526-005", no:"HT-2026-005", name:"华辰制造法律服务协议", short:"华辰制造 / 劳动争议", confirmer:"孙合伙人", relation:"补充", path:"所内模板", riskCount:3, highRiskCount:0, bc:"无明显差异", status:"待审查", cAt:"2026-05-29", maker:"王律师" },
        { id:"LSA-20260525-007", no:"HT-2026-007", name:"启明数据付款协议", short:"启明数据 / 数据合规", confirmer:"周合伙人", relation:"追加", path:"客户模板或既有版本", riskCount:5, highRiskCount:2, bc:"存在差异", status:"待补充说明", cAt:"2026-05-28", maker:"李律师" },
        { id:"LSA-20260524-008", no:"HT-2026-008", name:"方舟生物标准法律服务协议", short:"方舟生物 / 许可合作", confirmer:"孙合伙人", relation:"独立", path:"所内模板", riskCount:1, highRiskCount:0, bc:"无明显差异", status:"审查通过", cAt:"2026-05-24", maker:"陈秘书" },
        { id:"LSA-20260526-004", no:"HT-2026-004", name:"云岚资本英文版服务协议", short:"云岚资本 / 美元基金", confirmer:"周合伙人", relation:"替换", path:"客户模板或既有版本", riskCount:6, highRiskCount:3, bc:"无法自动比对", status:"标记问题", cAt:"2026-05-26", maker:"陈秘书" }
      ];

      function statusTag(text) {
        const cls = text === "审查通过" ? "green" : text === "标记问题" ? "red" : text === "待补充说明" ? "amber" : "gray";
        return `<span class="tag ${cls}">${text}</span>`;
      }
      function bcTag(text) {
        const cls = text === "存在差异" ? "red" : text === "无法自动比对" ? "amber" : "green";
        return `<span class="tag ${cls}">${text}</span>`;
      }
      const filters = {
        status: "全部",
        risk: "全部",
        path: "全部",
        relation: "全部",
        bc: "全部",
        confirmer: "",
        maker: "",
        no: "",
        cStart: "",
        cEnd: ""
      };
      function getFilteredReviews() {
        return reviews.filter(item => {
          if (filters.status !== "全部" && item.status !== filters.status) return false;
          if (filters.risk === "高风险" && item.highRiskCount <= 0) return false;
          if (filters.risk === "中风险" && !(item.riskCount > 0 && item.highRiskCount === 0)) return false;
          if (filters.risk === "低风险" && item.riskCount > 1) return false;
          if (filters.path !== "全部" && item.path !== filters.path) return false;
          if (filters.relation !== "全部" && item.relation !== filters.relation) return false;
          if (filters.bc !== "全部" && item.bc !== filters.bc) return false;
          if (filters.confirmer && !item.confirmer.includes(filters.confirmer)) return false;
          if (filters.maker && !item.maker.includes(filters.maker)) return false;
          if (filters.no && !item.no.includes(filters.no)) return false;
          if (filters.cStart && item.cAt < filters.cStart) return false;
          if (filters.cEnd && item.cAt > filters.cEnd) return false;
          return true;
        });
      }
      function renderRows(items) {
        return items.length ? items.map(item => `
          <tr class="${item.highRiskCount > 0 ? "high-risk" : ""}">
            <td>${item.no}</td><td>${item.name}</td><td>${item.short}</td><td>${item.confirmer}</td><td>${item.relation}</td><td>${item.path}</td><td>${item.riskCount}</td><td class="${item.highRiskCount > 0 ? "risk-number" : ""}">${item.highRiskCount}</td><td>${bcTag(item.bc)}</td><td>${statusTag(item.status)}</td><td>${item.cAt}</td>
            <td><button onclick="location.href='./compliance-detail.html?contractId=${item.id}'">查看审查</button></td>
          </tr>
        `).join("") : `<tr><td colspan="12" class="muted">暂无匹配合同</td></tr>`;
      }
      function applyFilters() {
        document.getElementById("reviewRows").innerHTML = renderRows(getFilteredReviews());
      }
      function render() {
        const root = document.getElementById("app");
        if (!canReview) {
          root.innerHTML = `<section class="panel denied">暂无权限访问该页面。</section>`;
          return;
        }
        root.innerHTML = `
          <section class="stats">
            <div class="stat"><span>待审查</span><strong>1</strong></div>
            <div class="stat"><span>高风险待关注</span><strong>2</strong></div>
            <div class="stat"><span>B/C存在差异</span><strong>1</strong></div>
            <div class="stat"><span>待补充说明</span><strong>1</strong></div>
            <div class="stat"><span>本月已审查</span><strong>8</strong></div>
          </section>
          <section class="panel">
            <div class="filters">
              <label>审查状态<select data-filter="status"><option>全部</option><option>待审查</option><option>审查通过</option><option>待补充说明</option><option>标记问题</option></select></label>
              <label>风险等级<select data-filter="risk"><option>全部</option><option>高风险</option><option>中风险</option><option>低风险</option></select></label>
              <label>协议路径<select data-filter="path"><option>全部</option><option>所内模板</option><option>客户模板或既有版本</option></select></label>
              <label>协议关系<select data-filter="relation"><option>全部</option><option>独立</option><option>替换</option><option>追加</option><option>补充</option></select></label>
              <label>B/C一致性<select data-filter="bc"><option>全部</option><option>无明显差异</option><option>存在差异</option><option>无法自动比对</option></select></label>
              <label>签约确认人<input data-filter="confirmer" placeholder="输入签约确认人" /></label>
              <label>制作人<input data-filter="maker" placeholder="输入制作人" /></label>
              <label>合同编号<input data-filter="no" placeholder="输入合同编号" /></label>
              <label>C版上传开始<input data-filter="cStart" type="date" /></label>
              <label>C版上传结束<input data-filter="cEnd" type="date" /></label>
            </div>
          </section>
          <section class="panel">
            <table>
              <thead><tr><th>合同编号</th><th>合同名称</th><th>客户/项目简称</th><th>签约确认人</th><th>协议关系</th><th>协议路径</th><th>风险数量</th><th>高风险数量</th><th>B/C一致性</th><th>审查状态</th><th>C版上传时间</th><th>操作</th></tr></thead>
              <tbody id="reviewRows">${renderRows(getFilteredReviews())}</tbody>
            </table>
          </section>`;
        document.querySelectorAll("[data-filter]").forEach(control => {
          control.addEventListener("input", event => {
            filters[event.target.dataset.filter] = event.target.value.trim();
            applyFilters();
          });
          control.addEventListener("change", event => {
            filters[event.target.dataset.filter] = event.target.value.trim();
            applyFilters();
          });
        });
      }
      render();
    </script>
  </body>
</html>
