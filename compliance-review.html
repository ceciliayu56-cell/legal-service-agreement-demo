<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>合规事后抽查</title>
    <style>
      :root { --bg:#f5f7fb; --panel:#fff; --text:#172033; --muted:#667085; --line:#e5eaf0; --primary:#1f6feb; --red:#d92d20; --green:#079455; --amber:#b54708; }
      * { box-sizing:border-box; }
      body { margin:0; background:var(--bg); color:var(--text); font-family:"PingFang SC","Microsoft YaHei",Arial,sans-serif; }
      header { min-height:72px; display:flex; align-items:center; justify-content:space-between; gap:24px; padding:16px 32px; background:#fff; border-bottom:1px solid var(--line); }
      main { max-width:1280px; margin:26px auto; padding:0 24px; display:grid; gap:18px; }
      h1,h2,h3,p { margin:0; }
      h1 { font-size:22px; }
      h2 { font-size:18px; }
      .muted { color:var(--muted); margin-top:6px; line-height:1.7; }
      .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 24px rgba(16,24,40,.06); padding:20px; }
      .denied { min-height:300px; display:grid; place-items:center; font-size:22px; font-weight:700; color:var(--muted); }
      .stats { display:grid; grid-template-columns:repeat(6,1fr); gap:14px; }
      .stat { border:1px solid var(--line); border-radius:8px; background:#fff; padding:16px; }
      .stat span { color:var(--muted); font-size:13px; }
      .stat strong { display:block; margin-top:8px; font-size:26px; }
      .filters { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; }
      label { display:grid; gap:6px; color:var(--muted); font-size:13px; }
      select,input { height:36px; border:1px solid #cfd8e3; border-radius:7px; padding:0 10px; font:inherit; background:#fff; color:var(--text); }
      table { width:100%; border-collapse:collapse; }
      th,td { padding:12px 10px; border-bottom:1px solid var(--line); text-align:left; font-size:13px; vertical-align:top; }
      th { color:var(--muted); background:#fbfcfe; font-weight:650; }
      tr.recommend { background:#fff8f8; }
      tr.recommend td { border-bottom-color:#fee4e2; }
      .score { font-weight:800; color:var(--red); }
      .tag { display:inline-flex; border-radius:999px; padding:4px 9px; font-size:12px; font-weight:700; background:#eef4ff; color:#175cd3; white-space:nowrap; }
      .tag.red { background:#fff1f3; color:var(--red); }
      .tag.green { background:#ecfdf3; color:var(--green); }
      .tag.amber { background:#fffaeb; color:var(--amber); }
      .tag.gray { background:#f2f4f7; color:#475467; }
      .logic-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:14px; }
      .logic-item { border:1px solid var(--line); border-radius:8px; background:#f8fafc; padding:12px; color:#344054; line-height:1.7; font-size:14px; }
      a,button { color:var(--primary); font-weight:650; text-decoration:none; }
      button { min-height:32px; border:1px solid #b9cff8; border-radius:7px; padding:0 12px; background:#fff; cursor:pointer; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>合规事后抽查 / 合规抽查台</h1>
        <p class="muted">合规委员会通过筛选、排序和抽查优先级选择本期合同；系统只提示更值得抽查的线索，不强制分配全部审查任务。</p>
      </div>
      <a id="homeLink" href="./index.html">法律服务协议管理</a>
    </header>

    <main id="app"></main>

    <script>
      const roleParam = new URLSearchParams(location.search).get("role");
      const canReview = roleParam !== "secretary" && roleParam !== "lawyer" && roleParam !== "partner";

      const reviews = [
        { id:"LSA-20260525-007", no:"HT-2026-007", name:"启明数据付款协议", short:"启明数据 / 数据合规", confirmer:"周合伙人", relation:"追加", path:"客户模板/既有版本", score:96, highDiff:true, bottomline:true, bc:"存在差异", status:"待补充说明", cAt:"2026-05-28", maker:"李律师" },
        { id:"LSA-20260526-004", no:"HT-2026-004", name:"云岚资本英文版服务协议", short:"云岚资本 / 美元基金", confirmer:"周合伙人", relation:"替换", path:"客户模板/既有版本", score:91, highDiff:true, bottomline:true, bc:"无法自动比对", status:"建议抽查", cAt:"2026-05-26", maker:"陈秘书" },
        { id:"LSA-20260526-005", no:"HT-2026-005", name:"华辰制造法律服务协议", short:"华辰制造 / 劳动争议", confirmer:"孙合伙人", relation:"补充", path:"所内模板", score:74, highDiff:false, bottomline:true, bc:"无明显差异", status:"建议抽查", cAt:"2026-05-29", maker:"王律师" },
        { id:"LSA-20260524-008", no:"HT-2026-008", name:"方舟生物标准法律服务协议", short:"方舟生物 / 许可合作", confirmer:"孙合伙人", relation:"独立", path:"所内模板", score:42, highDiff:false, bottomline:false, bc:"无明显差异", status:"已抽查", cAt:"2026-05-24", maker:"陈秘书" },
        { id:"LSA-20260523-010", no:"HT-2026-010", name:"知产许可争议服务协议", short:"知产科技 / 争议解决", confirmer:"赵合伙人", relation:"独立", path:"所内模板", score:82, highDiff:true, bottomline:true, bc:"存在差异", status:"建议抽查", cAt:"2026-05-23", maker:"刘律师" }
      ];

      const filters = { status:"全部", path:"全部", relation:"全部", bc:"全部", bottomline:"全部", keyword:"", sort:"score" };

      function statusTag(text) {
        const cls = text === "已抽查" ? "green" : text === "待补充说明" ? "amber" : text === "标记问题" ? "red" : "gray";
        return `<span class="tag ${cls}">${text}</span>`;
      }
      function yesNoTag(value) {
        return value ? `<span class="tag red">是</span>` : `<span class="tag green">否</span>`;
      }
      function bcTag(text) {
        const cls = text === "存在差异" ? "red" : text === "无法自动比对" ? "amber" : "green";
        return `<span class="tag ${cls}">${text}</span>`;
      }
      function getFilteredReviews() {
        return reviews.filter(item => {
          const haystack = `${item.no} ${item.name} ${item.short} ${item.confirmer} ${item.maker}`.toLowerCase();
          if (filters.keyword && !haystack.includes(filters.keyword.toLowerCase())) return false;
          if (filters.status !== "全部" && item.status !== filters.status) return false;
          if (filters.path !== "全部" && item.path !== filters.path) return false;
          if (filters.relation !== "全部" && item.relation !== filters.relation) return false;
          if (filters.bc !== "全部" && item.bc !== filters.bc) return false;
          if (filters.bottomline === "仅底线相关" && !item.bottomline) return false;
          return true;
        }).sort((a,b) => filters.sort === "date" ? b.cAt.localeCompare(a.cAt) : b.score - a.score);
      }
      function renderRows(items) {
        return items.length ? items.map((item, index) => `
          <tr class="${index < 3 || item.bottomline ? "recommend" : ""}">
            <td>${item.no}</td>
            <td>${item.name}<br><span class="muted">${item.short}</span></td>
            <td>${item.confirmer}</td>
            <td>${item.relation}</td>
            <td>${item.path}</td>
            <td class="score">${item.score}</td>
            <td>${yesNoTag(item.highDiff)}</td>
            <td>${yesNoTag(item.bottomline)}</td>
            <td>${bcTag(item.bc)}</td>
            <td>${statusTag(item.status)}</td>
            <td>${item.cAt}</td>
            <td><button onclick="location.href='./compliance-detail.html?contractId=${item.id}'">查看线索</button></td>
          </tr>
        `).join("") : `<tr><td colspan="12" class="muted">暂无匹配合同</td></tr>`;
      }
      function applyFilters() {
        document.getElementById("reviewRows").innerHTML = renderRows(getFilteredReviews());
      }
      function render() {
        const root = document.getElementById("app");
        if (!canReview) {
          root.innerHTML = `<section class="panel denied">暂无权限访问该页面。</section>`;
          return;
        }
        root.innerHTML = `
          <section class="stats">
            <div class="stat"><span>建议抽查 Top 10</span><strong>5</strong></div>
            <div class="stat"><span>高差异合同</span><strong>3</strong></div>
            <div class="stat"><span>底线相关差异</span><strong>4</strong></div>
            <div class="stat"><span>B/C存在差异</span><strong>2</strong></div>
            <div class="stat"><span>本期已抽查</span><strong>1</strong></div>
            <div class="stat"><span>待补充说明</span><strong>1</strong></div>
          </section>
          <section class="panel">
            <div class="filters">
              <label>关键词<input data-filter="keyword" placeholder="合同/客户/编号/人员" /></label>
              <label>抽查状态<select data-filter="status"><option>全部</option><option>建议抽查</option><option>已抽查</option><option>待补充说明</option><option>标记问题</option></select></label>
              <label>协议路径<select data-filter="path"><option>全部</option><option>所内模板</option><option>客户模板/既有版本</option></select></label>
              <label>协议关系<select data-filter="relation"><option>全部</option><option>独立</option><option>替换</option><option>追加</option><option>补充</option></select></label>
              <label>B/C一致性<select data-filter="bc"><option>全部</option><option>无明显差异</option><option>存在差异</option><option>无法自动比对</option></select></label>
              <label>底线相关<select data-filter="bottomline"><option>全部</option><option>仅底线相关</option></select></label>
              <label>排序<select data-filter="sort"><option value="score">按抽查优先级</option><option value="date">按C版上传时间</option></select></label>
            </div>
          </section>
          <section class="panel">
            <table>
              <thead><tr><th>合同编号</th><th>合同名称</th><th>签约确认人</th><th>协议关系</th><th>协议路径</th><th>优先级</th><th>高差异</th><th>底线相关</th><th>B/C一致性</th><th>抽查状态</th><th>C版上传</th><th>操作</th></tr></thead>
              <tbody id="reviewRows">${renderRows(getFilteredReviews())}</tbody>
            </table>
          </section>
          <section class="panel">
            <h2>风险识别逻辑说明</h2>
            <p class="muted">系统输出结果用于形成抽查优先级，而不是自动认定违规；后续需要用真实合同进行测试和校准。</p>
            <div class="logic-grid">
              <div class="logic-item">系统目标不是替代合规委员会作最终判断，而是提示哪些合同更值得抽查。</div>
              <div class="logic-item">系统重点关注是否可能突破事务所底线规则。</div>
              <div class="logic-item">系统不只按条款号比对，也应识别全文中与底线规则相关的语义表达。</div>
              <div class="logic-item">对赔偿责任、责任限制、利益冲突、付款条件、服务范围、解除条款等底线相关内容提高权重。</div>
              <div class="logic-item">对一般措辞、格式、非实质性文字调整降低权重。</div>
              <div class="logic-item">输出结果用于形成抽查优先级，而不是自动认定违规。</div>
              <div class="logic-item">后续需要用真实合同进行测试和校准。</div>
            </div>
          </section>`;
        document.querySelectorAll("[data-filter]").forEach(control => {
          control.addEventListener("input", event => {
            filters[event.target.dataset.filter] = event.target.value.trim();
            applyFilters();
          });
          control.addEventListener("change", event => {
            filters[event.target.dataset.filter] = event.target.value.trim();
            applyFilters();
          });
        });
      }
      render();
    </script>
  </body>
</html>
