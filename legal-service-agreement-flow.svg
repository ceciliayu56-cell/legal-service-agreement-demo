  <rect class="bg" width="1800" height="2100"/>
  <text x="90" y="95" class="title">法律服务协议线上化建议流程图</text>
  <text x="90" y="138" class="subtitle">基于现有 A/B/C 版本流与访谈反馈：底线条款突破前置审批，用印作为总闸口</text>

  <rect x="70" y="180" width="1660" height="360" class="lane"/>
  <text x="100" y="230" class="lane-title">一、发起与版本生成</text>

  <rect x="120" y="280" width="260" height="130" class="card"/>
  <text x="150" y="325" class="node-title">新建协议</text>
  <text x="150" y="360" class="node-text">客户、案件、签约主体</text>
  <text x="150" y="390" class="node-text">签约确认人、业务组</text>

  <polygon points="520,265 660,345 520,425 380,345" class="diamond"/>
  <text x="455" y="340" class="decision-title">制作路径</text>
  <text x="462" y="370" class="small">所内 / 客户</text>

  <rect x="750" y="220" width="290" height="130" class="card-blue"/>
  <text x="780" y="265" class="node-title">所内模板路径</text>
  <text x="780" y="300" class="node-text">制作规则版 / A版</text>
  <text x="780" y="330" class="node-text">可做标准条款预报备</text>

  <rect x="750" y="390" width="290" height="120" class="card-amber"/>
  <text x="780" y="435" class="node-title">客户模板路径</text>
  <text x="780" y="470" class="node-text">跳过A版，直接上传B版</text>
  <text x="780" y="500" class="node-text">默认更高风险路径</text>

  <rect x="1190" y="300" width="300" height="130" class="card"/>
  <text x="1220" y="345" class="node-title">上传B版</text>
  <text x="1220" y="380" class="node-text">待用印版本</text>
  <text x="1220" y="410" class="node-text">后续风控以B版为准</text>

  <path d="M 380 345 L 372 345" class="arrow"/>
  <path d="M 660 345 C 700 345 705 285 750 285" class="arrow"/>
  <path d="M 660 345 C 700 345 705 450 750 450" class="arrow"/>
  <path d="M 1040 285 C 1090 285 1120 365 1190 365" class="arrow"/>
