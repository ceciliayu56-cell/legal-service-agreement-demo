  <text x="100" y="1580" class="lane-title">四、C版核查、合规审查与归档</text>

  <rect x="140" y="1660" width="280" height="130" class="card"/>
  <text x="170" y="1705" class="node-title">上传C版</text>
  <text x="170" y="1740" class="node-text">双方签署/盖章最终版</text>
  <text x="170" y="1770" class="node-text">作为归档版本保存</text>

  <rect x="560" y="1660" width="280" height="130" class="card-blue"/>
  <text x="590" y="1705" class="node-title">B/C一致性核查</text>
  <text x="590" y="1740" class="node-text">确认盖章版未被替换</text>
  <text x="590" y="1770" class="node-text">发现差异则进入审查</text>

  <polygon points="1040,1635 1200,1725 1040,1815 880,1725" class="diamond"/>
  <text x="975" y="1720" class="decision-title">是否异常？</text>
  <text x="960" y="1752" class="small">差异/材料/归档</text>

