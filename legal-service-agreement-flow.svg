<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2100" viewBox="0 0 1800 2100">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { font: 700 44px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .subtitle { font: 400 24px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #667085; }
      .lane-title { font: 700 26px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #344054; }
      .node-title { font: 700 24px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .node-text { font: 400 19px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #475467; }
      .decision-title { font: 700 22px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #172033; }
      .small { font: 400 17px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #667085; }
      .pill { font: 700 17px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #fff; }
      .card { fill: #fff; stroke: #d0d5dd; stroke-width: 2; rx: 16; }
      .card-blue { fill: #eff8ff; stroke: #84caff; stroke-width: 2; rx: 16; }
      .card-green { fill: #ecfdf3; stroke: #75e0a7; stroke-width: 2; rx: 16; }
      .card-amber { fill: #fffaeb; stroke: #fdb022; stroke-width: 2; rx: 16; }
      .card-red { fill: #fff1f3; stroke: #f97066; stroke-width: 2; rx: 16; }
      .diamond { fill: #fff; stroke: #98a2b3; stroke-width: 2; }
      .lane { fill: #ffffff; stroke: #e4e7ec; stroke-width: 2; rx: 24; }
      .arrow { stroke: #667085; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .arrow-red { stroke: #d92d20; stroke-width: 3; fill: none; marker-end: url(#arrow-red); }
      .arrow-green { stroke: #079455; stroke-width: 3; fill: none; marker-end: url(#arrow-green); }
      .label { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #344054; }
      .label-red { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #b42318; }
      .label-green { font: 700 18px "Microsoft YaHei", "PingFang SC", Arial, sans-serif; fill: #067647; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#667085"/>
    </marker>
    <marker id="arrow-red" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
