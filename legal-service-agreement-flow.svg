  <rect x="70" y="1120" width="1660" height="360" class="lane"/>
  <text x="100" y="1170" class="lane-title">三、签约确认与用印总闸口</text>

  <rect x="150" y="1240" width="320" height="130" class="card-green"/>
  <text x="180" y="1285" class="node-title">签约确认人承诺</text>
  <text x="180" y="1320" class="node-text">确认已阅读B版</text>
  <text x="180" y="1350" class="node-text">知悉风险与授权结论</text>

  <polygon points="680,1195 850,1305 680,1415 510,1305" class="diamond"/>
  <text x="602" y="1300" class="decision-title">用印前置</text>
  <text x="620" y="1332" class="decision-title">是否齐备？</text>

  <rect x="980" y="1205" width="310" height="130" class="card-blue"/>
  <text x="1010" y="1250" class="node-title">发起用印申请</text>
  <text x="1010" y="1285" class="node-text">带出B版、案件、主体</text>
  <text x="1010" y="1315" class="node-text">进入飞书/用印审批</text>

  <rect x="980" y="1365" width="310" height="90" class="card-red"/>
  <text x="1010" y="1405" class="node-title">阻断用印</text>
  <text x="1010" y="1438" class="node-text">提示补齐或退回B版</text>

  <rect x="1420" y="1235" width="220" height="120" class="card"/>
  <text x="1450" y="1280" class="node-title">用印完成</text>
  <text x="1450" y="1315" class="node-text">等待上传C版</text>

