  <text x="675" y="275" class="label-green">所内模板</text>
  <text x="675" y="455" class="label">客户模板</text>

  <rect x="70" y="590" width="1660" height="480" class="lane"/>
  <text x="100" y="640" class="lane-title">二、B版风险识别与分层处理</text>

  <rect x="120" y="720" width="300" height="135" class="card-blue"/>
  <text x="150" y="765" class="node-title">系统识别B版风险</text>
  <text x="150" y="800" class="node-text">A/B差异、标准条款修改</text>
  <text x="150" y="830" class="node-text">案件/主体/签约信息校验</text>

  <polygon points="600,675 760,785 600,895 440,785" class="diamond"/>
  <text x="520" y="780" class="decision-title">是否突破</text>
  <text x="512" y="812" class="decision-title">底线条款？</text>

  <rect x="850" y="645" width="310" height="135" class="card-red"/>
  <text x="880" y="690" class="node-title">底线突破专项审批</text>
  <text x="880" y="725" class="node-text">合规/授权审批人判断</text>
  <text x="880" y="755" class="node-text">未通过不得继续用印</text>

  <rect x="850" y="845" width="310" height="135" class="card-amber"/>
  <text x="880" y="890" class="node-title">一般风险处理</text>
  <text x="880" y="925" class="node-text">填写说明、补充报备</text>
  <text x="880" y="955" class="node-text">形成留痕但不强制审批</text>

  <polygon points="1320,675 1480,785 1320,895 1160,785" class="diamond"/>
  <text x="1255" y="780" class="decision-title">审批是否</text>
  <text x="1285" y="812" class="decision-title">通过？</text>

  <rect x="1510" y="650" width="170" height="130" class="card-green"/>
  <text x="1542" y="700" class="node-title">放行</text>
  <text x="1532" y="735" class="node-text">记录依据</text>
  <text x="1532" y="765" class="node-text">可继续</text>

  <rect x="1510" y="850" width="170" height="130" class="card-red"/>
  <text x="1535" y="900" class="node-title">驳回</text>
  <text x="1530" y="935" class="node-text">退回修改</text>
  <text x="1530" y="965" class="node-text">或终止</text>

